bo:
  heatmap_resolution:
    type: categorical
    values: [16, 32, 64, 128]

  input_resolution:
    type: categorical
    values:
      - [128, 128]
      - [256, 256]
      - [512, 512]

  lr:
    type: loguniform
    low: 1e-5
    high: 5e-3

  lcmap_weight:
    type: uniform
    low: 0.0
    high: 5.0
  lcoff_weight:
    type: uniform
    low: 0.0
    high: 1.0
  lleng_weight:
    type: uniform
    low: 0.0
    high: 1.0
  angle_weight:
    type: uniform
    low: 0.0
    high: 3.0
  count_weight:
    type: uniform
    low: 1.0
    high: 5.0
  count_sigma:
    type: uniform
    low: 0.5
    high: 1.5
