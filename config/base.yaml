io:
  logdir: logs/IQI
  datadir: /datasets/PAR/CODE/F-Clip/data/IQI/processed    #/datasets/PAR/CODE/F-Clip/data/wireframe  # /datasets/PAR/CODE/F-Clip/data/IQI/processed     #
  num_workers: 8
  tensorboard_port: 0
  validation_interval: 60000
  visual_num: 2

model:
  image:
      mean: [125.678420]
      stddev: [65.406591]
  batch_size: 16
  eval_batch_size: 2

  # backbone multi-task parameters
  ang_type: radian
  lformat: la    # la means length angle, dxdy means
  head_net: [raw, raw, raw, raw, raw]  # see MultitaskHead for details  raw, mask, raw_upsampler, line
  head:
    order: [lcmap, lcoff, lleng, angle, count]  # [lcmap, lcoff, lleng, angle, count]
    lcmap:
      head_size: 2
      loss: Focal_loss  # Focal_loss  CE
      focal_alpha: 5.0
      loss_weight: 3.
    lcoff:
      head_size: 1
      loss: sigmoid_L1
      loss_weight: 0.25
    lleng:
      head_size: 1
      loss: sigmoid_L1  # sigmoid_L1, L1, lt
      loss_weight: 0.
    angle:
      head_size: 1
      loss: sigmoid_L1
      loss_weight: 1.
    count:
      head_size: 8
      loss: CE
      loss_weight: 1.

  # data augment: expand
  crop: True
  crop_factor: 1.2
  resolution: 64
  heatmap_1d: True

  stage1: fclip
  delta: 0.8
  nlines: 7
  s_nms: 2


optim:
  name: Adam
  lr_scheduler: multi_step # single_step, warmUpSingle_step, warmUpCos_step, multi_step
  lr: 4.0e-4
  amsgrad: True
  weight_decay: 1.0e-4
  max_epoch: 300
  lr_decay_epoch: [240,280]
